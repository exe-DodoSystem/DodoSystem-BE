services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: smeflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  redis:
    image: redis:7
    container_name: smeflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smeflow-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always

  webapi:
    image: smeflow-webapi:latest
    build:
      context: .
      dockerfile: SMEFLOWSystem.WebAPI/Dockerfile
    container_name: smeflow-webapi
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SMEFLOWSystem;User ID=sa;Password=YourStrong@Password123;Encrypt=False;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - sqlserver
      - redis
      - rabbitmq
    restart: always

volumes:
  rabbitmq_data:
  redis_data:
  sqlserver_data: